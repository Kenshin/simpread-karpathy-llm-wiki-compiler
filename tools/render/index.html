<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="author" content="Kenshin"/>
    <meta name="description" content="RenderPeek · 简悦 Andrej Karpathy LLM Wiki HTML 预览工具" />
    <meta name="generator" content="简悦 LLM Wiki Knowledge Compiler">
    <meta name="thumbnail" content="https://simpread-1254315611.cos.ap-shanghai.myqcloud.com/static/introduce-2.png"/>
    <meta property="og:image" content="https://simpread-1254315611.cos.ap-shanghai.myqcloud.com/static/introduce-2.png"/>
    <meta property="og:image:type" content="image/png"/>
    <meta property="og:image:width" content="960"/>
    <meta property="og:image:height" content="355"/>
    <link rel="icon" type="image/png" sizes="256x256"  href="https://simpread-1254315611.file.myqcloud.com/favicon/logo@mobile.png">
    <meta name="msapplication-TileColor" content="#2196f3">
    <meta name="theme-color" content="#1976d2">
    <title>RenderPeek · 简悦 Andrej Karpathy LLM Wiki HTML 预览工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* 浮动控制面板 */
        .control-panel {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.06);
            max-width: calc(100vw - 32px);
            opacity: 0.18;
            transition: opacity 0.3s ease;
        }

        .control-panel:hover,
        .control-panel.is-idle {
            opacity: 1;
        }

        .control-panel .label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            white-space: nowrap;
        }

        #file-select {
            min-width: 200px;
            max-width: 400px;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            color: #1f2937;
            background-color: #fff;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #file-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        #file-select:hover {
            border-color: #9ca3af;
        }

        .control-panel .info {
            font-size: 12px;
            color: #6b7280;
            white-space: nowrap;
        }

        /* iframe 容器 */
        .iframe-container {
            width: 100%;
            height: 100%;
        }

        #preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* 空状态提示 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6b7280;
            text-align: center;
            padding: 20px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state .title {
            font-size: 18px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .empty-state .desc {
            font-size: 14px;
            max-width: 400px;
            line-height: 1.6;
        }

        /* 错误状态 */
        .error-state {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 16px;
            color: #991b1b;
            font-size: 13px;
            line-height: 1.8;
        }

        .error-state code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 12px;
        }

        /* 暗色模式 */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111827;
            }

            .control-panel {
                background: rgba(31, 41, 55, 0.95);
                border-color: rgba(255, 255, 255, 0.1);
            }

            .control-panel .label {
                color: #e5e7eb;
            }

            #file-select {
                background-color: #1f2937;
                border-color: #4b5563;
                color: #f3f4f6;
            }

            #file-select:focus {
                border-color: #60a5fa;
                box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
            }

            .control-panel .info {
                color: #9ca3af;
            }

            .empty-state .title {
                color: #e5e7eb;
            }

            .empty-state .desc,
            .empty-state .icon {
                color: #9ca3af;
            }

            .error-state {
                background: #451a1a;
                border-color: #7f1d1d;
                color: #fca5a5;
            }

            .error-state code {
                background: rgba(255, 255, 255, 0.08);
            }
        }
    </style>
</head>
<body>
    <div class="control-panel is-idle" id="control-panel">
        <span class="label">预览文件:</span>
        <select id="file-select">
            <option value="">加载中...</option>
        </select>
        <span class="info" id="file-info"></span>
    </div>

    <div class="iframe-container" id="iframe-container">
        <div class="empty-state" id="empty-state">
            <div class="icon">&#128196;</div>
            <div class="title">HTML Preview</div>
            <div class="desc">从左上角下拉菜单选择一个 HTML 文件进行预览</div>
        </div>
        <iframe id="preview-iframe" style="display: none;" sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox"></iframe>
    </div>

    <script>
        var select = document.getElementById('file-select');
        var iframe = document.getElementById('preview-iframe');
        var emptyState = document.getElementById('empty-state');
        var fileInfo = document.getElementById('file-info');
        var controlPanel = document.getElementById('control-panel');

        function showError(msg) {
            select.innerHTML = '<option value="">无可用文件</option>';
            select.disabled = true;
            emptyState.innerHTML = '<div class="error-state">' + msg + '</div>';
        }

        function loadFileList() {
            fetch('/api/html-files')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.error) {
                        showError(data.error);
                        return;
                    }

                    var files = data.files;
                    if (!files || files.length === 0) {
                        showError('outputs/ 目录下没有找到 HTML 文件，请使用 <code>/render [主题]</code> 生成 HTML 👉 <a href="https://github.com/Kenshin/simpread-karpathy-llm-wiki-compiler/tree/main/template" target="_blank" style="color:#195bf7;text-decoration:none;font-weight:bold;">详细说明</a>');
                        return;
                    }

                    select.innerHTML = '<option value="">-- 选择文件 --</option>';
                    files.forEach(function(file) {
                        var opt = document.createElement('option');
                        opt.value = file;
                        opt.textContent = file;
                        select.appendChild(opt);
                    });

                    fileInfo.textContent = files.length + ' 个文件可用';
                })
                .catch(function(err) {
                    console.error('Failed to load file list:', err);
                    showError('无法连接到服务器');
                });
        }

        function loadFile(filename) {
            if (!filename) {
                iframe.style.display = 'none';
                emptyState.style.display = 'flex';
                controlPanel.classList.add('is-idle');
                return;
            }

            iframe.src = '/api/html-content?file=' + encodeURIComponent(filename);
            iframe.style.display = 'block';
            emptyState.style.display = 'none';
            controlPanel.classList.remove('is-idle');
        }

        select.addEventListener('change', function() {
            loadFile(this.value);
        });

        loadFileList();
    </script>
</body>
</html>
